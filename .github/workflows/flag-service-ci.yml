name: Flag Service CI

on:
  push:
    branches: [main]
    paths:
      - 'services/flag-service/**'
      - '.github/workflows/flag-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/flag-service/**'
      - '.github/workflows/flag-service-ci.yml'

env:
  SERVICE_NAME: flag-service
  SERVICE_DIR: services/flag-service
  PYTHON_VERSION: '3.11'
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing || echo "No tests found, skipping"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flag-service-coverage
          path: ${{ env.SERVICE_DIR }}/coverage.xml
          retention-days: 7

  lint:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 pylint

      - name: Run flake8
        working-directory: ${{ env.SERVICE_DIR }}
        run: flake8 . --max-line-length=120 --exclude=__pycache__,.venv

      - name: Run pylint
        working-directory: ${{ env.SERVICE_DIR }}
        run: pylint app.py --fail-under=6.0 --disable=C0114,C0115,C0116 || true

  security-scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: SCA - Trivy filesystem scan (dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ env.SERVICE_DIR }}
          exit-code: '1'
          severity: 'CRITICAL'
          format: 'sarif'
          output: 'trivy-sca-results.sarif'

      - name: Upload SCA results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-sca-results.sarif'
          category: 'sca-flag-service'

      - name: SAST - Install bandit
        run: pip install bandit[sarif]

      - name: SAST - Run bandit
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          bandit -r . -f sarif -o bandit-results.sarif --exclude .venv,tests || true
          # Fail on HIGH/CRITICAL findings
          RESULT=$(bandit -r . -ll --exit-zero --exclude .venv,tests 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -qE "Severity: (HIGH|CRITICAL)"; then
            echo "CRITICAL/HIGH security issues found by bandit. Failing pipeline."
            exit 1
          fi

      - name: Upload SAST results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ env.SERVICE_DIR }}/bandit-results.sarif
          category: 'sast-flag-service'

  docker-build-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="v1.0.0-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          docker build -t ${{ steps.meta.outputs.image }} .
          docker tag ${{ steps.meta.outputs.image }} ${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:latest

      - name: Container Scan - Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          exit-code: '1'
          severity: 'CRITICAL'
          format: 'sarif'
          output: 'trivy-container-results.sarif'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-container-results.sarif'
          category: 'container-flag-service'

      - name: Push image to ECR
        run: |
          docker push ${{ steps.meta.outputs.image }}
          docker push ${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:latest

  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tag in GitOps manifests
        run: |
          TAG="${{ needs.docker-build-push.outputs.image_tag }}"
          FILE="gitops/apps/${{ env.SERVICE_NAME }}/deployment.yaml"
          sed -i "s|image: .*${{ env.SERVICE_NAME }}:.*|image: ${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:${TAG}|g" "${FILE}"

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/${{ env.SERVICE_NAME }}/deployment.yaml
          git commit -m "chore(gitops): update ${{ env.SERVICE_NAME }} image to ${{ needs.docker-build-push.outputs.image_tag }}" || echo "No changes to commit"
          git push
