name: Auth Service CI

on:
  push:
    branches: [main]
    paths:
      - 'services/auth-service/**'
      - '.github/workflows/auth-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/auth-service/**'
      - '.github/workflows/auth-service-ci.yml'

env:
  SERVICE_NAME: auth-service
  SERVICE_DIR: services/auth-service
  GO_VERSION: '1.22'
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Download dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: go mod download

      - name: Build
        working-directory: ${{ env.SERVICE_DIR }}
        run: go build -v ./...

      - name: Run unit tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-coverage
          path: ${{ env.SERVICE_DIR }}/coverage.out
          retention-days: 7

  lint:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ env.SERVICE_DIR }}
          args: --timeout=5m

  security-scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: SCA - Trivy filesystem scan (dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ env.SERVICE_DIR }}
          exit-code: '1'
          severity: 'CRITICAL'
          format: 'sarif'
          output: 'trivy-sca-results.sarif'

      - name: Upload SCA results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-sca-results.sarif'
          category: 'sca-auth-service'

      - name: SAST - Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: SAST - Run gosec
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          gosec -fmt sarif -out "$GITHUB_WORKSPACE/gosec-results.sarif" ./... || true
          gosec -severity critical -fmt text ./... 2>&1 | tee gosec-output.txt || true
          if grep -q "Issues (Critical)" gosec-output.txt; then
            echo "CRITICAL security issues found by gosec. Failing pipeline."
            exit 1
          fi

      - name: Ensure gosec SARIF exists
        if: always()
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/gosec-results.sarif" ]; then
            echo '{"version":"2.1.0","runs":[]}' > "$GITHUB_WORKSPACE/gosec-results.sarif"
          fi

      - name: Upload SAST results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
          category: 'sast-auth-service'

  docker-build-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="v1.0.0-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          docker build -t ${{ steps.meta.outputs.image }} .
          docker tag ${{ steps.meta.outputs.image }} ${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:latest

      - name: Container Scan - Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          exit-code: '1'
          severity: 'CRITICAL'
          format: 'sarif'
          output: 'trivy-container-results.sarif'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-container-results.sarif'
          category: 'container-auth-service'

      - name: Push image to ECR
        run: |
          docker push ${{ steps.meta.outputs.image }}
          docker push ${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:latest

  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tag in GitOps manifests
        run: |
          TAG="${{ needs.docker-build-push.outputs.image_tag }}"
          FILE="gitops/apps/${{ env.SERVICE_NAME }}/deployment.yaml"
          sed -i "s|image: .*${{ env.SERVICE_NAME }}:.*|image: ${ECR_REGISTRY}/${{ env.SERVICE_NAME }}:${TAG}|g" "${FILE}"

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/${{ env.SERVICE_NAME }}/deployment.yaml
          git commit -m "chore(gitops): update ${{ env.SERVICE_NAME }} image to ${{ needs.docker-build-push.outputs.image_tag }}" || echo "No changes to commit"
          git push
