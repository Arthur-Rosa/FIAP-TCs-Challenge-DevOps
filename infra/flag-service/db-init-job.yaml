apiVersion: batch/v1
kind: Job
metadata:
  name: flag-db-init
  namespace: feature-flags
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: postgres-client
        image: postgres:15-alpine
        env:
        - name: PGHOST
          value: "feature-flags-flag-db.cluster-c01kesg62uh4.us-east-1.rds.amazonaws.com"
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          value: "flags_db"
        - name: PGUSER
          value: "flags_user"
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: db-init-flag
              key: PGPASSWORD
        command:
        - /bin/sh
        - -c
        - |
          psql -c "CREATE TABLE IF NOT EXISTS flags (
            id SERIAL PRIMARY KEY,
            name VARCHAR(100) UNIQUE NOT NULL, 
            description TEXT,
            is_enabled BOOLEAN NOT NULL DEFAULT false,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );"
          
          psql -c "CREATE OR REPLACE FUNCTION trigger_set_timestamp()
          RETURNS TRIGGER AS \$\$
          BEGIN
            NEW.updated_at = NOW();
            RETURN NEW;
          END;
          \$\$ LANGUAGE plpgsql;"
          
          psql -c "DROP TRIGGER IF EXISTS set_timestamp ON flags;"
          
          psql -c "CREATE TRIGGER set_timestamp
          BEFORE UPDATE ON flags
          FOR EACH ROW
          EXECUTE PROCEDURE trigger_set_timestamp();"
          
          echo "Tabelas e triggers do flag-service criados/verificados com sucesso!"
      dnsPolicy: ClusterFirst
