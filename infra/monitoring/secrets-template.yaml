# =============================================================================
# SECRETS TEMPLATE - Fase 4 (Observabilidade)
# =============================================================================
# NÃO commite este arquivo com valores reais.
# Execute o comando abaixo para criar os secrets no cluster:
#
# kubectl create secret generic monitoring-secrets \
#   --namespace monitoring \
#   --from-literal=DD_API_KEY='<sua-datadog-api-key>' \
#   --from-literal=DD_SITE='datadoghq.com' \
#   --from-literal=PAGERDUTY_INTEGRATION_KEY='<sua-pagerduty-integration-key>' \
#   --from-literal=DISCORD_WEBHOOK_URL='<url-do-webhook-discord>' \
#   --from-literal=GRAFANA_ADMIN_PASSWORD='<senha-admin-grafana>'
#
# Onde obter cada credencial:
#   Datadog API Key          : https://app.datadoghq.com/organization-settings/api-keys
#   PagerDuty Integration Key: PagerDuty → Services → <seu serviço> → Integrations
#                              → Add Integration → "Events API v2" → copiar Integration Key
#   Discord Webhook          : Canal Discord → Editar Canal → Integrações → Webhooks
#   GitHub PAT               : https://github.com/settings/tokens (para self-healing)
#
# Após criar o secret, também crie o secret para o GitHub PAT (self-healing):
# kubectl create secret generic self-healing-secrets \
#   --namespace feature-flags \
#   --from-literal=GITHUB_PAT='<seu-github-pat>'
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secrets
  namespace: monitoring
type: Opaque
stringData:
  DD_API_KEY: "REPLACE_ME"
  DD_SITE: "us5.datadoghq.com"
  PAGERDUTY_INTEGRATION_KEY: "REPLACE_ME"
  DISCORD_WEBHOOK_URL: "REPLACE_ME"
  GRAFANA_ADMIN_PASSWORD: "REPLACE_ME"
