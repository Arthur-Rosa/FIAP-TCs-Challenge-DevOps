apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: monitoring
data:
  togglemaster.json: |
    {
      "title": "ToggleMaster - Observability Dashboard",
      "uid": "togglemaster-main",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["feature-flags", "togglemaster"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Visão Geral do Cluster",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total de Requisições/s",
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{namespace=\"feature-flags\"}[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 500 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Taxa de Erros 5xx",
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\",namespace=\"feature-flags\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{namespace=\"feature-flags\"}[5m]))",
              "legendFormat": "error rate",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "CPU do Cluster (%)",
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "minVizWidth": 75,
            "minVizHeight": 75
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "type": "gauge",
          "title": "Memória do Cluster (%)",
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "(1 - avg(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Mem %",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              }
            }
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Métricas dos Microsserviços",
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Taxa de Requisições HTTP por Serviço (req/s)",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by(service_name) (rate(http_server_request_duration_seconds_count{namespace=\"feature-flags\"}[5m]))",
              "legendFormat": "{{ service_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Taxa de Erros 5xx por Serviço",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by(service_name) (rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\",namespace=\"feature-flags\"}[5m])) / sum by(service_name) (rate(http_server_request_duration_seconds_count{namespace=\"feature-flags\"}[5m]))",
              "legendFormat": "{{ service_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "thresholdsStyle": { "mode": "line+area" }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Latência P95 por Serviço (ms)",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by(service_name, le) (rate(http_server_request_duration_seconds_bucket{namespace=\"feature-flags\"}[5m]))) * 1000",
              "legendFormat": "p95 {{ service_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Pods Ativos por Serviço",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by(deployment) (kube_deployment_status_replicas_available{namespace=\"feature-flags\"})",
              "legendFormat": "{{ deployment }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "id": 20,
          "type": "row",
          "title": "Logs em Tempo Real",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 21,
          "type": "logs",
          "title": "Logs - Namespace feature-flags",
          "gridPos": { "x": 0, "y": 23, "w": 24, "h": 10 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"feature-flags\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ]
    }
