apiVersion: v1
kind: Secret
metadata:
  name: ecr-registry-secret
  namespace: feature-flags
type: kubernetes.io/dockerconfigjson
data:
  # Para atualizar este secret, execute:
  # kubectl create secret docker-registry ecr-registry-secret \
  #   --docker-server=851725193065.dkr.ecr.us-east-1.amazonaws.com \
  #   --docker-username=AWS \
  #   --docker-password=$(aws ecr get-login-password --region us-east-1) \
  #   --namespace=feature-flags \
  #   --dry-run=client -o yaml | grep -A 2 "data:" | tail -1 | awk '{print $2}' > /tmp/ecr-secret-value.txt
  # Depois copie o valor base64 do arquivo /tmp/ecr-secret-value.txt para substituir o valor abaixo
